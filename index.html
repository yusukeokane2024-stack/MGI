<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MGI Ultimate - Strategy Workspace</title>
    
    <!-- Libraries (安定したCDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase (Compat API) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #F8FAFB; -webkit-tap-highlight-color: transparent; }
        .main-title { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); border-top: 1px solid rgba(212, 175, 55, 0.1); }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .animate-pulse-slow { animation: pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pop { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .7; transform: scale(1.05); } }
        input[type="range"] { accent-color: #D4AF37; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root">
        <div id="boot-loader" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#F8FAFB;">
            <div style="width:32px; height:32px; border:3px solid #D4AF37; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite;"></div>
            <p style="margin-top:20px; font-size:12px; font-weight:bold; color:#94A3B8; letter-spacing:0.1em;">CONNECTING SYSTEM...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ==========================================
        // 🚀 キャッシュ自動破棄バージョニング設定
        // ==========================================
        const APP_VERSION = '1.2.0'; 

        const initMGI = () => {
            if (!window.Recharts || !window.React || !window.firebase) {
                setTimeout(initMGI, 100);
                return;
            }

            const { PieChart, Pie, Cell, ResponsiveContainer, AreaChart, Area, XAxis, Tooltip, CartesianGrid, Legend } = window.Recharts;

            const firebaseConfig = { 
                apiKey: "AIzaSyBmq8Y8LiGU_HGmyiCFEjt8rN-enPn5zzw", 
                authDomain: "mgi-pocket.firebaseapp.com",
                projectId: "mgi-pocket",
                storageBucket: "mgi-pocket.firebasestorage.app",
                messagingSenderId: "461429650252",
                appId: "1:461429650252:web:2876c556e4f2bbfe5fd5e9"
            };
            const MGI_ID = 'mgi-ultimate-v1';

            const ASSET_CATEGORIES = {
                '生活防衛資金': { color: '#455A64', label: '防衛', icon: 'wallet' },
                '現金': { color: '#B2EBF2', label: '現金', icon: 'banknote' },
                '株式': { color: '#D4AF37', label: '株式', icon: 'trending-up' },
                '老後資金': { color: '#5C6BC0', label: '老後', icon: 'coffee' },
                '不動産': { color: '#FF7043', label: '不動産', icon: 'building-2' },
                '暗号資産': { color: '#9575CD', label: '暗号', icon: 'bitcoin' },
                'ゴールド': { color: '#FDD835', label: '金', icon: 'gem' }
            };

            const COST_ITEMS = [
                { id: 'insurance', label: '保険', icon: 'shield' },
                { id: 'mobile', label: '通信・Wi-Fi', icon: 'wifi' },
                { id: 'subscription', label: 'サブスク', icon: 'zap' },
                { id: 'lessons', label: '習い事・学び', icon: 'graduation-cap' },
                { id: 'housing', label: '住居・ローン', icon: 'home' }
            ];

            const Icon = ({ name, className = "w-5 h-5" }) => {
                useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
                return <i data-lucide={name} className={className}></i>;
            };

            // デモ用の初期データ
            const DEFAULT_ASSETS = [
                { id: 'demo-asset-1', name: '生活防衛：楽天銀行', amount: 1200000, category: '生活防衛資金' },
                { id: 'demo-asset-2', name: 'eMAXIS Slim 全世界株式', amount: 3500000, category: '株式' },
                { id: 'demo-asset-3', name: '米国高配当ETF', amount: 1500000, category: '株式' },
                { id: 'demo-asset-4', name: 'ビットコイン積立', amount: 800000, category: '暗号資産' }
            ];

            const DEFAULT_COSTS = {
                insurance: { current: 18000, after: 5000 },
                mobile: { current: 8500, after: 3200 },
                subscription: { current: 4000, after: 1500 },
                lessons: { current: 15000, after: 10000 },
                housing: { current: 85000, after: 85000 }
            };

            const DEFAULT_HISTORY = [
                { id: 'h-1', dateLabel: '2/1', total: 4500000, '生活防衛資金': 1200000, '株式': 2500000, '暗号資産': 800000 },
                { id: 'h-2', dateLabel: '3/1', total: 5200000, '生活防衛資金': 1200000, '株式': 3200000, '暗号資産': 800000 },
                { id: 'h-3', dateLabel: '4/1', total: 7000000, '生活防衛資金': 1200000, '株式': 5000000, '暗号資産': 800000 }
            ];

            const isBiometricsSupported = () => {
                return !!(window.PublicKeyCredential && 
                          typeof window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function');
            };

            const formatWithCommas = (val) => {
                if (val === undefined || val === null || val === '') return '';
                const numStr = String(val).replace(/[^0-9]/g, '');
                if (numStr === '') return '';
                return Number(numStr).toLocaleString('ja-JP');
            };

            const parseCommas = (val) => {
                const numStr = String(val).replace(/[^0-9]/g, '');
                return numStr === '' ? 0 : Number(numStr);
            };

            const App = () => {
                const [user, setUser] = useState(null);
                const [activeTab, setActiveTab] = useState('costs');
                const [loading, setLoading] = useState(true);
                const [isDemoMode, setIsDemoMode] = useState(false);
                const [assets, setAssets] = useState([]);
                const [costs, setCosts] = useState({});
                const [history, setHistory] = useState([]);
                
                const [isLocked, setIsLocked] = useState(false);
                const [bioSupported, setBioSupported] = useState(false);
                const [bioEnabled, setBioEnabled] = useState(false);
                const [bioError, setBioError] = useState('');
                
                // Firestoreエラー表示用ステート
                const [dbError, setDbError] = useState('');

                const [authMode, setAuthMode] = useState('login'); 
                const [email, setEmail] = useState('');
                const [password, setPassword] = useState('');
                const [authError, setAuthError] = useState('');
                const [authLoading, setAuthLoading] = useState(false);
                const [showPassword, setShowPassword] = useState(false);

                const [simMode, setSimMode] = useState('current'); 
                const [simRate, setSimRate] = useState(7);
                const [simYears, setSimYears] = useState(30);
                const [simMonthlyManual, setSimMonthlyManual] = useState(null);
                const [simInitialManual, setSimInitialManual] = useState(0);
                const [hoveredData, setHoveredData] = useState(null);

                const [isAdding, setIsAdding] = useState(false);
                const [editingAsset, setEditingAsset] = useState(null);
                const [newItem, setNewItem] = useState({ name: '', amount: 0, category: '株式' });
                const [confirmDelete, setConfirmDelete] = useState({ isOpen: false, type: '', id: null, name: '' });
                const [showSettings, setShowSettings] = useState(false);

                // ==================================================
                // 🛡️ キャッシュバスター・安全ガード付き自動アップデート
                // ==================================================
                useEffect(() => {
                    const hostname = window.location.hostname;
                    
                    const isPreviewOrLocal = 
                        hostname.includes('localhost') || 
                        hostname.includes('127.0.0.1') || 
                        hostname.includes('googleusercontent.com') || 
                        hostname.includes('webcontainer.io') ||
                        window.location.pathname.includes('/artifacts/');

                    if (isPreviewOrLocal) return;

                    const queryParams = new URLSearchParams(window.location.search);
                    const currentQueryVersion = queryParams.get('v');
                    const savedVersion = localStorage.getItem('mgi_app_version');

                    if (savedVersion !== APP_VERSION || currentQueryVersion !== APP_VERSION) {
                        localStorage.setItem('mgi_app_version', APP_VERSION);
                        const cleanUrl = window.location.pathname + '?v=' + APP_VERSION;
                        window.location.replace(cleanUrl);
                    }
                }, []);

                useEffect(() => {
                    let isMounted = true;
                    let authUnsubscribe = () => {};
                    let assetsUnsubscribe = () => {};
                    let costsUnsubscribe = () => {};
                    let historyUnsubscribe = () => {};

                    if (isBiometricsSupported()) {
                        window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()
                            .then(available => {
                                if (isMounted) setBioSupported(available);
                            });
                    }

                    // 4秒経ってもFirebaseが反応しない場合のみの通信エラー用フォールバック
                    const connectionTimeout = setTimeout(() => {
                        if (loading && isMounted) {
                            enableDemoMode();
                        }
                    }, 4000);

                    const enableDemoMode = () => {
                        setIsDemoMode(true);
                        const localAssets = localStorage.getItem('mgi_assets');
                        const localCosts = localStorage.getItem('mgi_costs');
                        const localHistory = localStorage.getItem('mgi_history');
                        setAssets(localAssets ? JSON.parse(localAssets) : DEFAULT_ASSETS);
                        setCosts(localCosts ? JSON.parse(localCosts) : DEFAULT_COSTS);
                        setHistory(localHistory ? JSON.parse(localHistory) : DEFAULT_HISTORY);
                        setLoading(false);
                        const l = document.getElementById('boot-loader');
                        if (l) l.style.display = 'none';
                    };

                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(firebaseConfig);
                        }
                        const auth = firebase.auth();
                        const db = firebase.firestore();

                        authUnsubscribe = auth.onAuthStateChanged((u) => {
                            clearTimeout(connectionTimeout);
                            if (!isMounted) return;

                            if (u) {
                                setUser(u);
                                setIsDemoMode(false);
                                setAuthError('');
                                setDbError('');

                                const bioFlag = localStorage.getItem(`mgi_bio_enabled_${u.uid || u.email}`) === 'true';
                                setBioEnabled(bioFlag);

                                if (bioFlag) {
                                    setIsLocked(true);
                                    setTimeout(() => triggerBiometricUnlock(u), 300);
                                }

                                const userRef = db.collection('artifacts').doc(MGI_ID).collection('users').doc(u.uid);
                                
                                // エラー時に勝手にデモモードにしない
                                assetsUnsubscribe = userRef.collection('assets').onSnapshot(s => {
                                    setAssets(s.docs.map(d => ({id: d.id, ...d.data()})));
                                    setDbError(''); // 成功したらエラー消去
                                }, err => {
                                    console.error("Firestore Error:", err);
                                    if (err.code === 'permission-denied') {
                                        setDbError('データベースが未作成、またはアクセス権限がありません。Firebaseコンソールで設定を行ってください。');
                                    } else {
                                        enableDemoMode();
                                    }
                                });

                                costsUnsubscribe = userRef.collection('settings').doc('costs').onSnapshot(doc => {
                                    if(doc.exists) setCosts(doc.data());
                                }, err => console.error(err));

                                historyUnsubscribe = userRef.collection('history').onSnapshot(s => {
                                    setHistory(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>a.timestamp-b.timestamp));
                                }, err => console.error(err));

                                setLoading(false);
                                const l = document.getElementById('boot-loader');
                                if (l) l.style.display = 'none';
                            } else {
                                setUser(null);
                                setAssets([]);
                                setCosts({});
                                setHistory([]);
                                setIsLocked(false);
                                setLoading(false);
                                const l = document.getElementById('boot-loader');
                                if (l) l.style.display = 'none';
                            }
                        });
                    } catch (e) {
                        console.warn("Firebase startup failed", e);
                        enableDemoMode();
                    }

                    return () => {
                        isMounted = false;
                        clearTimeout(connectionTimeout);
                        authUnsubscribe();
                        assetsUnsubscribe();
                        costsUnsubscribe();
                        historyUnsubscribe();
                    };
                }, []);

                const handleToggleBiometrics = async () => {
                    if (!user) return;
                    const userId = user.uid || user.email;

                    if (bioEnabled) {
                        localStorage.removeItem(`mgi_bio_enabled_${userId}`);
                        localStorage.removeItem(`mgi_bio_cred_id_${userId}`);
                        setBioEnabled(false);
                        return;
                    }

                    try {
                        setBioError('');
                        const challenge = new Uint8Array(32);
                        window.crypto.getRandomValues(challenge);
                        const userArrayId = new Uint8Array(16);
                        window.crypto.getRandomValues(userArrayId);

                        const creationOptions = {
                            challenge: challenge,
                            rp: { name: "MGI Ultimate", id: window.location.hostname || "localhost" },
                            user: {
                                id: userArrayId,
                                name: user.email || "user@mgi-pocket.com",
                                displayName: (user.email || "Guest").split('@')[0],
                            },
                            pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
                            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required", requireResidentKey: false },
                            timeout: 60000,
                        };

                        const credential = await navigator.credentials.create({ publicKey: creationOptions });

                        if (credential) {
                            localStorage.setItem(`mgi_bio_enabled_${userId}`, 'true');
                            const credentialIdB64 = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
                            localStorage.setItem(`mgi_bio_cred_id_${userId}`, credentialIdB64);
                            setBioEnabled(true);
                        }
                    } catch (err) {
                        setBioError("生体認証の登録に失敗しました。対応ブラウザかつ端末のセキュリティが有効かご確認ください。");
                    }
                };

                const triggerBiometricUnlock = async (currentUser = user) => {
                    const activeUser = currentUser || user;
                    if (!activeUser) return;
                    const userId = activeUser.uid || activeUser.email;
                    const credIdB64 = localStorage.getItem(`mgi_bio_cred_id_${userId}`);
                    if (!credIdB64) { setIsLocked(false); return; }

                    try {
                        setBioError('');
                        const challenge = new Uint8Array(32);
                        window.crypto.getRandomValues(challenge);
                        const rawId = Uint8Array.from(atob(credIdB64), c => c.charCodeAt(0));

                        const requestOptions = {
                            challenge: challenge,
                            allowCredentials: [{ type: "public-key", id: rawId }],
                            timeout: 60000, userVerification: "required"
                        };

                        const assertion = await navigator.credentials.get({ publicKey: requestOptions });
                        if (assertion) setIsLocked(false);
                    } catch (err) {
                        setBioError("認証に失敗したか、キャンセルされました。再度お試しください。");
                    }
                };

                const handleAuth = async (e) => {
                    e.preventDefault();
                    if (!email || !password) {
                        setAuthError('メールアドレスとパスワードを入力してください。');
                        return;
                    }
                    setAuthLoading(true);
                    setAuthError('');

                    try {
                        const auth = firebase.auth();
                        if (authMode === 'login') {
                            await auth.signInWithEmailAndPassword(email, password);
                        } else {
                            await auth.createUserWithEmailAndPassword(email, password);
                        }
                    } catch (error) {
                        switch (error.code) {
                            case 'auth/invalid-email': setAuthError('無効なメールアドレスの形式です。'); break;
                            case 'auth/user-not-found': setAuthError('アカウントが見つかりません。新規登録をお試しください。'); break;
                            case 'auth/wrong-password': setAuthError('パスワードが正しくありません。'); break;
                            case 'auth/email-already-in-use': setAuthError('このメールアドレスは既に登録されています。'); break;
                            case 'auth/weak-password': setAuthError('パスワードは6文字以上で設定してください。'); break;
                            default: setAuthError('エラーが発生しました。入力内容をお確かめください。');
                        }
                    } finally {
                        setAuthLoading(false);
                    }
                };

                const handleSignOut = async () => {
                    try { await firebase.auth().signOut(); setShowSettings(false); } catch (err) {}
                };

                const handleAnonymousLogin = async () => {
                    setAuthLoading(true); setAuthError('');
                    try { await firebase.auth().signInAnonymously(); } catch (error) { setAuthError('ゲストログインに失敗しました。'); } finally { setAuthLoading(false); }
                };

                const handleSwitchToDemo = () => {
                    setIsDemoMode(true);
                    const localAssets = localStorage.getItem('mgi_assets');
                    const localCosts = localStorage.getItem('mgi_costs');
                    const localHistory = localStorage.getItem('mgi_history');
                    setAssets(localAssets ? JSON.parse(localAssets) : DEFAULT_ASSETS);
                    setCosts(localCosts ? JSON.parse(localCosts) : DEFAULT_COSTS);
                    setHistory(localHistory ? JSON.parse(localHistory) : DEFAULT_HISTORY);
                };

                const saveLocalData = (key, data) => {
                    if (isDemoMode) localStorage.setItem(key, JSON.stringify(data));
                };

                const sortedAssets = useMemo(() => {
                    const categoryOrder = Object.keys(ASSET_CATEGORIES);
                    return [...assets].sort((a, b) => categoryOrder.indexOf(a.category) - categoryOrder.indexOf(b.category));
                }, [assets]);

                const formatYen = (num) => (num / 10000).toLocaleString(undefined, {maximumFractionDigits:1}) + '万';
                
                const totals = useMemo(() => assets.reduce((acc, curr) => {
                    const amt = Number(curr.amount) || 0;
                    acc[curr.category] = (acc[curr.category] || 0) + amt;
                    acc.total += amt;
                    return acc;
                }, { total: 0 }), [assets]);

                const monthlySavingTotal = useMemo(() => {
                    return Object.values(costs).reduce((acc, item) => {
                        const diff = (Number(item.current) || 0) - (Number(item.after) || 0);
                        return acc + (diff > 0 ? diff : 0);
                    }, 0);
                }, [costs]);

                const currentSimMonthly = simMonthlyManual !== null ? simMonthlyManual : monthlySavingTotal;

                const simData = useMemo(() => {
                    const res = [];
                    const annualR = simRate / 100;
                    const monthlyR = Math.pow(1 + annualR, 1 / 12) - 1;
                    const initialCapital = simMode === 'current' ? (totals['株式'] || 0) + (totals['不動産'] || 0) + (totals['暗号資産'] || 0) + (totals['ゴールド'] || 0) + (totals['老後資金'] || 0) : simInitialManual;
                    
                    let currentTotal = initialCapital;
                    for (let i = 0; i <= simYears; i++) {
                        if (i > 0) {
                            for (let m = 0; m < 12; m++) currentTotal = (currentTotal + currentSimMonthly) * (1 + monthlyR);
                        }
                        const totalPrincipal = initialCapital + (currentSimMonthly * 12 * i);
                        res.push({ year: i, label: `${i}年`, amount: Math.round(currentTotal / 10000), principal: Math.round(totalPrincipal / 10000) });
                    }
                    return res;
                }, [totals, currentSimMonthly, simRate, simYears, simMode, simInitialManual]);

                const handleAdd = async () => {
                    if(!newItem.name || !newItem.amount) return;
                    if (isDemoMode) {
                        const nextAssets = [...assets, { id: 'local-' + Date.now(), ...newItem, amount: Number(newItem.amount) }];
                        setAssets(nextAssets); saveLocalData('mgi_assets', nextAssets);
                    } else {
                        await firebase.firestore().collection('artifacts').doc(MGI_ID).collection('users').doc(user.uid).collection('assets').add({ ...newItem, amount: Number(newItem.amount) });
                    }
                    setIsAdding(false); setNewItem({name:'', amount:0, category:'株式'});
                };

                const handleUpdate = async () => {
                    if(!editingAsset.name || !editingAsset.amount) return;
                    if (isDemoMode) {
                        const nextAssets = assets.map(a => a.id === editingAsset.id ? { ...editingAsset, amount: Number(editingAsset.amount) } : a);
                        setAssets(nextAssets); saveLocalData('mgi_assets', nextAssets);
                    } else {
                        await firebase.firestore().collection('artifacts').doc(MGI_ID).collection('users').doc(user.uid).collection('assets').doc(editingAsset.id).update({
                            name: editingAsset.name, amount: Number(editingAsset.amount), category: editingAsset.category
                        });
                    }
                    setEditingAsset(null);
                };

                const executeDelete = async () => {
                    if (isDemoMode) {
                        if (confirmDelete.type === 'asset') {
                            const nextAssets = assets.filter(a => a.id !== confirmDelete.id);
                            setAssets(nextAssets); saveLocalData('mgi_assets', nextAssets);
                        } else if (confirmDelete.type === 'history') {
                            const nextHistory = history.filter(h => h.id !== confirmDelete.id);
                            setHistory(nextHistory); saveLocalData('mgi_history', nextHistory);
                        }
                    } else {
                        const ref = firebase.firestore().collection('artifacts').doc(MGI_ID).collection('users').doc(user.uid);
                        if (confirmDelete.type === 'asset') await ref.collection('assets').doc(confirmDelete.id).delete();
                        else if (confirmDelete.type === 'history') await ref.collection('history').doc(confirmDelete.id).delete();
                    }
                    setConfirmDelete({ isOpen: false, type: '', id: null, name: '' });
                };

                const updateCost = async (id, type, val) => {
                    const cleanVal = parseCommas(val);
                    const newCosts = { ...costs, [id]: { ...costs[id], [type]: cleanVal } };
                    setCosts(newCosts);
                    if (isDemoMode) { saveLocalData('mgi_costs', newCosts); }
                    else { await firebase.firestore().collection('artifacts').doc(MGI_ID).collection('users').doc(user.uid).collection('settings').doc('costs').set(newCosts); }
                };

                const recordHistory = async () => {
                    if (totals.total === 0) return;
                    const snap = { total: totals.total, timestamp: Date.now(), dateLabel: (new Date().getMonth()+1)+"/"+new Date().getDate(), ...Object.keys(ASSET_CATEGORIES).reduce((acc, cat) => ({...acc, [cat]: totals[cat]||0}), {}) };
                    if (isDemoMode) {
                        const nextHistory = [...history, { id: 'local-h-' + Date.now(), ...snap }];
                        setHistory(nextHistory); saveLocalData('mgi_history', nextHistory);
                    } else {

                                    <div className="space-y-3">
                                        <h3 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">過去のログ</h3>
                                        {history.slice().reverse().map(record => (
                                            <div key={record.id} className="bg-white px-5 py-4 rounded-3xl flex justify-between items-center shadow-sm border border-gray-100">
                                                <div>
                                                    <span className="text-[10px] font-bold text-gray-400">{record.dateLabel}</span>
                                                    <div className="text-sm font-bold text-[#455A64]">{formatYen(record.total)}</div>
                                                </div>
                                                <button onClick={() => setConfirmDelete({ isOpen: true, type: 'history', id: record.id, name: `${record.dateLabel}の記録` })} className="text-gray-200 hover:text-red-400 p-2">
                                                    <Icon name="trash-2" className="w-4 h-4" />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </main>

                        <nav className="fixed bottom-6 left-6 right-6 h-18 glass-nav rounded-[28px] shadow-2xl flex items-center justify-around px-6 z-50">
                            <button onClick={()=>setActiveTab('costs')} className={`flex flex-col items-center gap-1 transition-all ${activeTab==='costs'?'text-[#D4AF37] scale-110':'text-gray-300'}`}><Icon name="scissors" /><span className="text-[7px] font-bold uppercase tracking-widest">Costs</span></button>
                            <button onClick={()=>setActiveTab('assets')} className={`flex flex-col items-center gap-1 transition-all ${activeTab==='assets'?'text-[#D4AF37] scale-110':'text-gray-300'}`}><Icon name="list" /><span className="text-[7px] font-bold uppercase tracking-widest">Balance</span></button>
                            <button onClick={()=>setActiveTab('plan')} className={`flex flex-col items-center gap-1 transition-all ${activeTab==='plan'?'text-[#D4AF37] scale-110':'text-gray-300'}`}><Icon name="target" /><span className="text-[7px] font-bold uppercase tracking-widest">Plan</span></button>
                            <button onClick={()=>setActiveTab('history')} className={`flex flex-col items-center gap-1 transition-all ${activeTab==='history'?'text-[#D4AF37] scale-110':'text-gray-300'}`}><Icon name="history" /><span className="text-[7px] font-bold uppercase tracking-widest">History</span></button>
                        </nav>

                        {/* Modals */}
                        {isAdding && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] flex items-center justify-center p-6 animate-pop">
                                <div className="bg-white rounded-[40px] p-8 w-full max-w-sm shadow-2xl space-y-4">
                                    <h3 className="font-bold text-[#455A64] text-center tracking-widest text-sm uppercase">Add Asset</h3>
                                    <input type="text" placeholder="資産名称" className="w-full p-4 bg-gray-50 rounded-2xl text-sm font-bold outline-none border-2 border-transparent focus:border-[#D4AF37]/30 text-[#455A64]" value={newItem.name} onChange={e=>setNewItem({...newItem, name: e.target.value})} />
                                    <input type="text" inputmode="numeric" placeholder="金額" className="w-full p-4 bg-gray-50 rounded-2xl text-sm font-bold outline-none border-2 border-transparent focus:border-[#D4AF37]/30 text-[#455A64]" value={formatWithCommas(newItem.amount)} onFocus={e => e.target.select()} onChange={e => setNewItem({...newItem, amount: parseCommas(e.target.value)})} />
                                    <div className="grid grid-cols-2 gap-2">{Object.keys(ASSET_CATEGORIES).map(cat => (<button key={cat} onClick={()=>setNewItem({...newItem, category:cat})} className={`py-2.5 rounded-xl text-[9px] font-bold ${newItem.category===cat ? 'bg-[#455A64] text-white shadow-md' : 'bg-gray-100 text-gray-400'}`}>{ASSET_CATEGORIES[cat].label}</button>))}</div>
                                    <div className="flex gap-2 pt-2"><button onClick={()=>setIsAdding(false)} className="flex-1 text-xs text-gray-400 font-bold uppercase">戻る</button><button onClick={handleAdd} className="flex-1 py-4 bg-[#D4AF37] text-white rounded-2xl text-sm font-bold shadow-lg">保存する</button></div>
                                </div>
                            </div>
                        )}

                        {editingAsset && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] flex items-center justify-center p-6 animate-pop">
                                <div className="bg-white rounded-[40px] p-8 w-full max-w-sm shadow-2xl space-y-4">
                                    <h3 className="font-bold text-[#455A64] text-center tracking-widest text-sm uppercase">Edit Asset</h3>
                                    <input type="text" className="w-full p-4 bg-gray-50 rounded-2xl text-sm font-bold outline-none border-2 border-transparent focus:border-[#D4AF37]/30 text-[#455A64]" value={editingAsset.name} onChange={e=>setEditingAsset({...editingAsset, name: e.target.value})} />
                                    <input type="text" inputmode="numeric" className="w-full p-4 bg-gray-50 rounded-2xl text-sm font-bold outline-none border-2 border-transparent focus:border-[#D4AF37]/30 text-[#455A64]" value={formatWithCommas(editingAsset.amount)} onFocus={e => e.target.select()} onChange={e => setEditingAsset({...editingAsset, amount: parseCommas(e.target.value)})} />
                                    <div className="grid grid-cols-2 gap-2">{Object.keys(ASSET_CATEGORIES).map(cat => (<button key={cat} onClick={()=>setEditingAsset({...editingAsset, category:cat})} className={`py-2.5 rounded-xl text-[9px] font-bold ${editingAsset.category===cat ? 'bg-[#455A64] text-white shadow-md' : 'bg-gray-100 text-gray-400'}`}>{ASSET_CATEGORIES[cat].label}</button>))}</div>
                                    <div className="flex gap-2 pt-2"><button onClick={()=>setEditingAsset(null)} className="flex-1 text-xs text-gray-400 font-bold uppercase">戻る</button><button onClick={handleUpdate} className="flex-1 py-4 bg-[#455A64] text-white rounded-2xl text-sm font-bold shadow-lg">更新する</button></div>
                                </div>
                            </div>
                        )}

                        {confirmDelete.isOpen && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] flex items-center justify-center p-6 animate-pop">
                                <div className="bg-white rounded-[40px] p-8 w-full max-w-sm space-y-6 shadow-2xl text-center"><div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto"><Icon name="trash-2" size={32}/></div><div><h3 className="font-bold text-[#455A64]">本当に削除しますか？</h3><p className="text-xs text-gray-400 mt-2">「{confirmDelete.name}」のデータは元に戻せません。</p></div><div className="flex gap-3"><button onClick={()=>setConfirmDelete({isOpen:false})} className="flex-1 py-4 text-xs font-bold text-gray-400">やめる</button><button onClick={executeDelete} className="flex-1 py-4 bg-red-500 text-white rounded-2xl text-xs font-bold shadow-lg">削除する</button></div></div>
                            </div>
                        )}

                        {showSettings && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] flex items-center justify-center p-6 animate-pop">
                                <div className="bg-white rounded-[40px] p-8 w-full max-w-sm shadow-2xl space-y-6">
                                    <div className="flex justify-between items-center pb-2 border-b border-gray-100">
                                        <h3 className="font-bold text-[#455A64] tracking-widest text-sm uppercase flex items-center gap-1.5">
                                            <Icon name="sliders-horizontal" className="text-[#D4AF37] w-4 h-4" />
                                            セキュリティ設定
                                        </h3>
                                        <button onClick={() => setShowSettings(false)} className="text-gray-300 hover:text-gray-500">
                                            <Icon name="x" className="w-5 h-5" />
                                        </button>
                                    </div>

                                    {/* Face ID 設定セクション */}
                                    <div className="space-y-3">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <h4 className="text-sm font-bold text-[#455A64] flex items-center gap-1.5">
                                                    <Icon name="scan-face" className="text-[#455A64] w-4 h-4" />
                                                    生体認証（Face ID / Touch ID）
                                                </h4>
                                                <p className="text-[10px] text-gray-400 mt-1 leading-relaxed">
                                                    次回起動時、顔認証または指紋認証で安全にロックを解除できるようにします。
                                                </p>
                                            </div>
                                            
                                            {bioSupported ? (
                                                <button 
                                                    onClick={handleToggleBiometrics}
                                                    className={`w-12 h-6 rounded-full p-0.5 transition-all duration-300 flex items-center ${bioEnabled ? 'bg-[#D4AF37] justify-end' : 'bg-gray-200 justify-start'}`}
                                                >
                                                    <div className="w-5 h-5 bg-white rounded-full shadow-md"></div>
                                                </button>
                                            ) : (
                                                <span className="text-[9px] font-bold text-gray-400 bg-gray-100 px-2 py-1 rounded-lg shrink-0">非対応</span>
                                            )}
                                        </div>

                                        {!bioSupported && (
                                            <p className="text-[9px] text-amber-600 bg-amber-50 p-2.5 rounded-xl leading-normal">
                                                ⚠️ お使いのブラウザ、またはデスクトップ等の端末環境が生体認証を許可していないか、端末へのパスコード登録が行われていない可能性があります。（SafariやChromeのHTTPS環境が必要です）
                                            </p>
                                        )}

                                        {bioError && (
                                            <p className="text-[10px] font-bold text-red-500 leading-normal bg-red-50 p-2.5 rounded-xl">
                                                {bioError}
                                            </p>
                                        )}
                                    </div>

                                    {/* 設定モーダルのフッター */}
                                    <div className="pt-2 border-t border-gray-100 flex justify-between items-center text-xs">
                                        <span className="text-gray-400 font-bold">MGI Ultimate v1.1.0</span>
                                        <button 
                                            onClick={() => setShowSettings(false)} 
                                            className="px-4 py-2 bg-gray-50 hover:bg-gray-100 text-[#455A64] rounded-xl font-bold"
                                        >
                                            閉じる
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        initMGI();
    </script>
</body>
</html>
